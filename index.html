<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.95); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh; width:100vw;}
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.3;}
        
        /* Kinetic Glitch Effect */
        #noise { position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; opacity:0; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(0,255,204,0.05) 0px, transparent 1px); }
        .ripping #noise { opacity: 0.3; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: scale(1.01) translate(2px); } 50% { transform: scale(1) translate(-2px); } }

        .interface { position: relative; z-index: 10; padding: 20px; height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        .cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .proto-btn { 
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 18px; font-size: 10px; letter-spacing: 2px; cursor: pointer; text-align: left;
            clip-path: polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%);
        }
        
        #stream { flex-grow: 1; overflow-y: auto; margin-top: 15px; scrollbar-width: none; }
        .card { background: var(--glass); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 12px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .row { display: flex; justify-content: space-between; font-size: 11px; padding: 6px 0; border-bottom: 1px dashed rgba(0, 255, 204, 0.2); }
        .val { color: var(--neon); font-weight: bold; }
        .prov { font-size: 8px; color: var(--neon); opacity: 0.6; margin-top: 10px; }

        .access-panel { border: 1px solid #ff3333; padding: 15px; margin-top: auto; text-align: center; background: rgba(255,0,0,0.05); }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="noise"></div>
    <div class="interface">
        <div style="letter-spacing:8px; color:var(--neon); font-size:10px; font-weight:900;">ARCHON INTELLIGENCE</div>
        <div id="target-id" style="font-size:24px; margin: 10px 0;">TARGET: NULL</div>

        <div class="cluster">
            <button class="proto-btn" onclick="triggerChain(target, 'username')">SINGULARITY RIP</button>
            <button class="proto-btn" onclick="location.reload()">RESET SYSTEM</button>
        </div>

        <div id="stream"></div>

        <div class="access-panel" id="access-box" onclick="grantAccess()">
            <div id="access-btn" style="color: #ff3333; font-size: 11px; font-weight: bold;">[ ESTABLISH SECURE UPLINK ]</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com"; 
        document.getElementById('target-id').innerText = target;

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.2; window.speechSynthesis.speak(u); }

        function grantAccess() {
            window.authorized = true;
            document.getElementById('access-box').style.borderColor = "#00ffcc";
            document.getElementById('access-box').innerHTML = "<div style='color:#00ffcc; font-size:11px;'>UPLINK STATUS: SECURE</div>";
            tg.HapticFeedback.notificationOccurred('success');
            speak("System access granted. Initializing Archon Intelligence.");
        }

        async function triggerChain(node, proto) {
            if(!window.authorized) return tg.showAlert("Establish Uplink First.");
            
            document.body.classList.add('ripping');
            coreSpeed = 0.1;
            speak(`Ripping node: ${proto}`);

            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${node}&protocol=${proto}`);
                const data = await res.json();
                
                renderCard(proto.toUpperCase() + "_DISCOVERY", data);

                // --- ⚡ THE CHAIN REACTION ---
                if(data.next_seeds && data.next_seeds.length > 0) {
                    data.next_seeds.forEach(seed => {
                        setTimeout(() => triggerChain(seed.t, seed.p), 3000);
                    });
                } else {
                    setTimeout(() => {
                        document.body.classList.remove('ripping');
                        coreSpeed = 0.005;
                        speak("All nodes synthesized.");
                    }, 2000);
                }
            } catch (e) {
                document.body.classList.remove('ripping');
                tg.showAlert("Uplink Timeout.");
            }
        }

        function renderCard(title, data) {
            const card = document.createElement('div');
            card.className = 'card';
            let html = `<div style="color:var(--neon); font-size:9px; margin-bottom:10px; letter-spacing:2px;">[ ${title} ]</div>`;
            card.innerHTML = html;
            document.getElementById('stream').prepend(card);

            // Ripping Data Rows
            Object.entries(data.payload).forEach(([k, v]) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<span>${k.toUpperCase()}</span><span class="val" id="rip-${title}-${k}">---</span>`;
                card.appendChild(row);
                decipherEffect(document.getElementById(`rip-${title}-${k}`), String(v));
            });

            // Exact Provenance (Hits & Sources)
            data.provenance.forEach(src => {
                const prov = document.createElement('div');
                prov.className = 'prov';
                prov.innerText = `SRC: ${src.source} | HITS: ${src.hits} | ACCURACY: ${src.accuracy}`;
                card.appendChild(prov);
            });
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function decipherEffect(el, val) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let i = 0;
            const interval = setInterval(() => {
                el.innerText = val.split("").map((c, idx) => idx < i ? val[idx] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if(i >= val.length) clearInterval(interval);
                i += 1/3;
            }, 40);
        }

        // --- 🧊 3D CORE ---
        let coreSpeed = 0.005;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
