<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.95); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow-x:hidden; height:100vh;}
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.8;}
        .container { padding: 25px; position:relative; z-index:10; display:flex; flex-direction:column; gap:15px; height: 100vh; overflow-y: auto;}
        
        .proto-btn { 
            width:100%; padding:20px; background:rgba(0,255,204,0.1); border:1px solid var(--neon);
            color:var(--neon); cursor:pointer; font-size:11px; letter-spacing:3px; margin-bottom:10px;
            transition: 0.3s;
        }
        .proto-btn:active { background: var(--neon); color: #000; }

        .data-card { 
            background: var(--glass); border-left: 5px solid var(--neon); padding: 20px;
            margin-top:15px; opacity:0; transform:translateY(30px); transition:0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .data-card.active { opacity:1; transform:translateY(0); }
        .row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed rgba(0,255,204,0.1); font-size:13px; }
        .val { color: var(--neon); text-shadow:0 0 10px var(--neon); }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div class="container">
        <div style="letter-spacing:10px; color:var(--neon); font-size:10px; font-weight:900;">ARCHON INTELLIGENCE</div>
        <div id="target-ui" style="font-size:22px; margin:10px 0; border-bottom: 1px solid var(--neon); padding-bottom:5px;">TARGET: LOCKING...</div>

        <div id="selector">
            <p style="font-size:10px; opacity:0.6;">SELECT NODAL PROTOCOL:</p>
            <button class="proto-btn" onclick="initiateCascade('ip')">NETWORK (IP)</button>
            <button class="proto-btn" onclick="initiateCascade('gstin')">FINANCE (GSTIN)</button>
            <button class="proto-btn" onclick="initiateCascade('email')">IDENTITY (EMAIL)</button>
        </div>

        <div id="output-stream"></div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        document.getElementById('target-ui').innerText = target;

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.1; window.speechSynthesis.speak(u); }

        async function initiateCascade(protocol) {
            document.getElementById('selector').style.display = 'none';
            speak("Protocol accepted. Archon Intelligence is initiating recursive chain reaction for target.");
            
            // REPLACE WITH YOUR ACTUAL BACKEND URL
            const res = await fetch(`https://your-backend.onrender.com/api/scan?target=${target}&protocol=${protocol}`);
            const data = await res.json();

            // The Chain Reaction Animation
            createCard("PRIMARY_SYNTHESIS", data.primary);
            if(data.spatial) setTimeout(() => createCard("SPATIAL_DEVIATION", data.spatial), 1200);
            if(data.infra || data.breach_node || data.recursive_pivot) {
                setTimeout(() => createCard("RECURSIVE_CASCADE", data.infra || data.breach_node || data.recursive_pivot), 2400);
            }
        }

        function createCard(title, content) {
            const card = document.createElement('div');
            card.className = 'data-card';
            let rows = `<div style="color:var(--neon); font-size:10px; margin-bottom:10px; letter-spacing:2px;">[ ${title} ]</div>`;
            for(let [k,v] of Object.entries(content)) {
                rows += `<div class="row"><span>${k.toUpperCase()}</span><span class="val">${v}</span></div>`;
            }
            card.innerHTML = rows;
            document.getElementById('output-stream').appendChild(card);
            setTimeout(() => { 
                card.classList.add('active');
                if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                speak(title.replace('_', ' ') + " synchronized.");
            }, 100);
        }

        // --- 🧊 THREE.JS CORE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
