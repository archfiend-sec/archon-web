<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON INTELLIGENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Share+Tech+Mono&display=swap');
        :root { --c-cyan: #00ffcc; --c-warn: #ffb700; --c-red: #ff2a2a; --bg: #010305; --glass: rgba(2, 10, 15, 0.7); }
        * { box-sizing: border-box; }
        
        /* Base & Scanline Effects */
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; user-select: none; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.8; }
        
        /* Responsive UI Wrapper */
        .ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; max-width: 1000px; margin: 0 auto; padding: 15px; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* Header Title */
        .archon-title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 4px; text-align: center; color: var(--c-cyan); flex-shrink: 0; margin-bottom: 15px; text-shadow: 2px 0 0 rgba(255,0,0,0.5), -2px 0 0 rgba(0,255,255,0.5); }
        
        /* Target Container */
        .target-box { background: var(--glass); border: 1px solid #111; border-left: 4px solid var(--c-cyan); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; margin-bottom: 10px; flex-shrink: 0; box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
        .scanning-laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--c-warn); opacity: 0; z-index: 5; box-shadow: 0 0 10px var(--c-warn); }
        body.hacking .scanning-laser { opacity: 1; animation: scanSweep 1.5s linear infinite; }
        .progress-bar { height: 2px; width: 0%; background: var(--c-cyan); transition: 0.6s; box-shadow: 0 0 10px var(--c-cyan); margin-bottom: 15px; flex-shrink: 0; }
        
        /* Button Layout */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; flex-shrink: 0; }
        .btn { background: rgba(0,20,30,0.6); border: 1px solid var(--c-cyan); color: var(--c-cyan); padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 11px; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; }
        .btn:active { background: var(--c-cyan); color: #000; }
        #btn-report { display: none; background: rgba(255, 42, 42, 0.2); border-color: var(--c-red); color: var(--c-red); grid-column: span 2; }
        
        /* Grid Layout for Dynamic Intel Cards */
        .stream { flex: 1 1 0; min-height: 0; overflow-y: auto; display: grid; grid-template-columns: 1fr; gap: 10px; align-content: start; padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .stream::-webkit-scrollbar { display: none; }
        
        .card { background: rgba(0,5,10,0.8); border: 1px solid #222; border-top: 2px solid var(--c-cyan); padding: 12px; animation: glitchIn 0.3s ease-out forwards; flex-shrink: 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        
        @keyframes glitchIn { 0% { opacity: 0; transform: skewX(-10deg) translateX(-20px); filter: hue-rotate(90deg); } 100% { opacity: 1; transform: skewX(0) translateX(0); filter: hue-rotate(0); } }
        @keyframes scanSweep { 0% { top: -5%; } 100% { top: 105%; } }
        
        /* Hardware Terminal */
        .terminal { height: 90px; background: rgba(0,2,5,0.9); border: 1px solid #1a1a1a; padding: 8px; font-size: 9px; color: #0f0; overflow-y: auto; flex-shrink: 0; scrollbar-width: none; text-shadow: 0 0 3px #0f0;}
        .terminal::-webkit-scrollbar { display: none; }
        .log-line { margin-bottom: 2px; }
        .log-line.kern { color: #555; font-size: 8px; text-shadow: none; }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (min-width: 600px) { /* Tablets & Small Desktops */
            .archon-title { font-size: 28px; margin-bottom: 20px; }
            .stream { grid-template-columns: 1fr 1fr; gap: 15px; }
            .btn { font-size: 13px; padding: 15px; }
            .terminal { height: 120px; font-size: 11px; }
        }
        @media (min-width: 900px) { /* Large Desktops */
            .ui-layer { padding: 30px; }
            .archon-title { font-size: 34px; letter-spacing: 8px; }
            .target-box { padding: 25px; }
            #target-id { font-size: 24px !important; }
            .stream { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .terminal { height: 150px; font-size: 12px; }
            .log-line.kern { font-size: 10px; }
        }

        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div style="font-family:'Orbitron'; font-size:26px; font-weight:900; color:var(--c-cyan); letter-spacing:8px; text-align: center;">ARCHON INTELLIGENCE</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div class="archon-title">ARCHON INTELLIGENCE</div>
        
        <div class="target-box interactive">
            <div class="scanning-laser"></div>
            <div>
                <div style="font-size:10px; color:#666;">TARGET_NODE</div>
                <div id="target-id" style="font-family:'Orbitron'; font-size:18px; color:var(--c-cyan);">AWAITING_INPUT</div>
            </div>
            <div id="sys-status" style="font-size:10px; border:1px solid var(--c-cyan); padding:4px 8px; color:var(--c-cyan);">STANDBY</div>
        </div>
        
        <div class="progress-bar" id="prog-bar"></div>
        
        <div class="btn-grid interactive">
            <div class="btn" onclick="start()">Execute Omni-Chain</div>
            <div class="btn" onclick="location.reload()" style="border-color:#444; color:#666;">Purge</div>
            <div class="btn" id="btn-report" onclick="downloadReport()">Download Tactical Report</div>
        </div>
        
        <div class="stream interactive" id="stream"></div>
        <div class="terminal interactive" id="term"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        try { tg.expand(); tg.disableVerticalSwipes(); } catch(e) {}

        const p = new URLSearchParams(window.location.search); const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        
        setTimeout(() => { document.getElementById('boot-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('boot-screen').remove(); if(target) visualDecrypt(document.getElementById('target-id'), target); }, 800); }, 1200);
        
        function visualDecrypt(el, str) { const c = "!<>-_\\/[]{}—=+*^?#_"; let i = 0; const inv = setInterval(() => { el.innerText = str.split("").map((l, idx) => idx < i ? str[idx] : c[Math.floor(Math.random()*c.length)]).join(""); if(i >= str.length) clearInterval(inv); i += 1/3; }, 35); }
        function log(m, c="#0f0", type="") { const e = document.createElement('div'); e.className = `log-line ${type}`; e.innerHTML = `<span style="color:${c}">[${new Date().toISOString().slice(11,19)}] ${m}</span>`; const t = document.getElementById('term'); t.appendChild(e); t.scrollTop = t.scrollHeight; while(t.childNodes.length > 50) t.removeChild(t.firstChild); }
        
        let busy = false; let cur = 0; 
        let masterReport = { target_node: target, operation_timestamp: new Date().toISOString(), modules: {} };
        
        async function start() {
            if(busy || !target) return; busy = true; document.body.classList.add('hacking');
            document.getElementById('sys-status').innerText = "EXTRACTING"; 
            document.getElementById('sys-status').style.borderColor = "var(--c-warn)";
            document.getElementById('sys-status').style.color = "var(--c-warn)";
            log(`STAGING_CHAIN: ${target}`, "var(--c-cyan)");
            execute(target, "initial");
        }
        
        async function execute(t, pr) {
            let chat_str = `CALL_STACK::${pr.toUpperCase()}`;
            const chatter = setInterval(() => { log(`${chat_str} -> PKT_${Math.floor(Math.random()*9999)} -> OK`, "#444", "kern"); }, 120);
            
            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(t)}&protocol=${pr}&v=${Date.now()}`);
                clearInterval(chatter); const data = await res.json(); 
                
                if(data.analysis && Object.keys(data.analysis).length > 0) {
                    masterReport.modules[pr.toUpperCase()] = data.analysis;
                    render(pr.toUpperCase(), data);
                }
                
                cur++; document.getElementById('prog-bar').style.width = `${Math.min(cur * 15, 90)}%`;
                
                if(data.pivots && data.pivots.length > 0) setTimeout(() => execute(data.pivots[0].t, data.pivots[0].p), 400);
                else { 
                    document.getElementById('prog-bar').style.width = '100%';
                    log("OMNI-CHAIN COMPLETE. ALL NODES VERIFIED.", "var(--c-red)"); 
                    document.getElementById('sys-status').innerText = "SECURED"; 
                    document.getElementById('sys-status').style.borderColor = "var(--c-red)";
                    document.getElementById('sys-status').style.color = "var(--c-red)";
                    document.body.classList.remove('hacking'); 
                    busy = false; 
                    document.getElementById('btn-report').style.display = 'block';
                }
            } catch(e) { clearInterval(chatter); log(`LINK_FAILURE :: ${pr.toUpperCase()}`, "var(--c-red)"); busy = false; }
        }
        
        function render(title, data) {
            const card = document.createElement('div'); card.className = 'card';
            let h = `<div style="font-size:10px; color:var(--c-cyan); margin-bottom:8px; letter-spacing:1px; border-bottom: 1px solid #333; padding-bottom:4px;">[ ${title} ]</div>`;
            
            Object.entries(data.analysis).forEach(([k, v]) => {
                const isAI = k.includes("Dossier") || k.includes("Hypothesis");
                let cClass = '#ccc';
                
                if(String(v).includes("OPEN") || String(v).includes("EXPOSED") || String(v).includes("FLAGGED") || String(v).includes("CRITICAL") || String(v).includes("MALWARE") || String(v).includes("ORBITAL")) cClass = 'var(--c-red)';
                else if(String(v).includes("FOUND") || String(v).includes("ACTIVE") || k.includes("Chronos") || k.includes("ID")) cClass = 'var(--c-warn)';
                else if(isAI) cClass = '#ff2a2a';

                h += `<div style="margin-bottom:8px;"><div style="font-size:9px; color:#666; text-transform:uppercase;">${k.replace(/_/g, ' ')}</div><div id="v-${title}-${k}" style="font-size:${isAI?'13px':'14px'}; color:${cClass}; margin-top:3px; word-break: break-all; cursor:pointer;">---</div></div>`;
            });
            card.innerHTML = h; 
            
            const stream = document.getElementById('stream');
            stream.prepend(card); stream.scrollTop = 0; 
            
            Object.entries(data.analysis).forEach(([k, v]) => {
                const el = document.getElementById(`v-${title}-${k}`);
                if (String(v).startsWith("http")) { el.onclick = () => window.open(String(v), '_blank'); el.style.textDecoration = "underline"; } 
                else { el.onclick = () => { navigator.clipboard.writeText(v); log("Copied to memory.", "var(--c-cyan)"); } }
                
                if(k.includes("Dossier") || k.includes("Hypothesis")) { el.textContent = ""; let j=0; const t=setInterval(()=>{el.textContent+=v[j++];if(j>=v.length)clearInterval(t)},10); }
                else el.textContent = v;
            });
        }
        
        function downloadReport() {
            const blob = new Blob([JSON.stringify(masterReport, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = `ARCHON_REPORT_${target.replace(/[^a-z0-9]/gi, '_')}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        
        // --- 🌌 THREE.JS ROTATING WIREFRAME EARTH ---
        const sc = new THREE.Scene(); const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ alpha:true, antialias:true }); rd.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(rd.domElement);
        
        // Window Resize Handler for Responsiveness
        window.addEventListener('resize', () => {
            rd.setSize(window.innerWidth, window.innerHeight);
            cam.aspect = window.innerWidth / window.innerHeight;
            cam.updateProjectionMatrix();
        });

        const geo = new THREE.SphereGeometry(1.8, 24, 24);
        const mat = new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.15});
        const globe = new THREE.Mesh(geo, mat); sc.add(globe);
        
        const pGeo = new THREE.BufferGeometry(); const pPos = new Float32Array(300*3); 
        for(let i=0; i<900; i++) pPos[i] = (Math.random()-0.5)*8;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3)); 
        const pMat = new THREE.PointsMaterial({size:0.02, color:0x00ffcc, transparent:true, opacity:0.3});
        const pts = new THREE.Points(pGeo, pMat); sc.add(pts); cam.position.z = 4;
        
        function animate() {
            requestAnimationFrame(animate); const h = document.body.classList.contains('hacking');
            globe.rotation.y += h ? 0.02 : 0.002; globe.rotation.x += 0.001;
            pts.rotation.y -= h ? 0.005 : 0.001;
            
            const pulse = h ? (1 + Math.sin(Date.now()*0.005)*0.05) : 1;
            globe.scale.set(pulse, pulse, pulse);
            
            mat.color.setHex(h ? 0xff2a2a : 0x00ffcc); pMat.color.setHex(h ? 0xff2a2a : 0x00ffcc); 
            rd.render(sc, cam);
        } animate();
    </script>
</body>
</html>
