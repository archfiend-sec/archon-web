<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.95); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh; width:100vw; }
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.3; }
        
        /* Kinetic Glitch Overlay */
        #noise { position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; opacity:0; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(0,255,204,0.05) 0px, transparent 1px); }
        .ripping #noise { opacity: 0.3; animation: glitch 0.15s infinite; }
        @keyframes glitch { 0% { opacity: 0.2; } 50% { opacity: 0.4; } 100% { opacity: 0.2; } }

        .interface { position: relative; z-index: 10; padding: 20px; height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        .cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .proto-btn { 
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 16px; font-size: 10px; letter-spacing: 2px; cursor: pointer; text-align: left;
            clip-path: polygon(0% 0%, 92% 0%, 100% 25%, 100% 100%, 0% 100%);
        }
        
        #stream { flex-grow: 1; overflow-y: auto; margin-top: 15px; scrollbar-width: none; }
        .card { background: var(--glass); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 12px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .row { display: flex; justify-content: space-between; font-size: 11px; padding: 6px 0; border-bottom: 1px dashed rgba(0, 255, 204, 0.2); }
        .val { color: var(--neon); font-weight: bold; }
        .prov { font-size: 8px; color: var(--neon); opacity: 0.5; margin-top: 10px; border-top: 1px solid rgba(0,255,204,0.1); padding-top: 5px; }

        .access-panel { border: 1px solid #ff3333; padding: 12px; margin-top: auto; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="noise"></div>
    <div class="interface">
        <div style="letter-spacing:10px; color:var(--neon); font-size:9px; font-weight:900;">ARCHON INTELLIGENCE</div>
        <div id="target-id" style="font-size:22px; margin: 10px 0;">TARGET: LOADING...</div>

        <div class="cluster">
            <button class="proto-btn" onclick="autoRip()">SINGULARITY RIP</button>
            <button class="proto-btn" onclick="location.reload()">RESET NODE</button>
        </div>

        <div id="stream"></div>

        <div class="access-panel" id="access-box" onclick="grantAccess()">
            <div id="access-btn" style="color: #ff3333; font-size: 10px; font-weight: bold; cursor:pointer;">[ ESTABLISH SECURE UPLINK ]</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com"; 
        document.getElementById('target-id').innerText = target;

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.1; window.speechSynthesis.speak(u); }

        function grantAccess() {
            window.authorized = true;
            document.getElementById('access-box').style.borderColor = "#00ffcc";
            document.getElementById('access-box').innerHTML = "<div style='color:#00ffcc; font-size:11px;'>UPLINK STATUS: SECURE</div>";
            tg.HapticFeedback.notificationOccurred('success');
            speak("Uplink secured. Ready for extraction.");
        }

        async function autoRip() {
            if(!window.authorized) return tg.showAlert("Manual Uplink Required.");
            let proto = target.includes('@') ? "email" : (target.match(/\d+\./) ? "ip" : "username");
            executeChain(target, proto);
        }

        async function executeChain(node, proto) {
            document.body.classList.add('ripping');
            coreSpeed = 0.12; 
            speak(`Ripping ${proto} node.`);

            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${node}&protocol=${proto}`);
                const data = await res.json();
                
                renderDetailedCard(proto.toUpperCase(), data);

                if(data.next_seeds && data.next_seeds.length > 0) {
                    data.next_seeds.forEach(seed => {
                        setTimeout(() => executeChain(seed.t, seed.p), 3500);
                    });
                } else {
                    setTimeout(() => {
                        document.body.classList.remove('ripping');
                        coreSpeed = 0.005;
                        speak("Chain reaction complete.");
                    }, 2000);
                }
            } catch (e) { document.body.classList.remove('ripping'); }
        }

        function renderDetailedCard(title, data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="color:var(--neon); font-size:9px; margin-bottom:8px; letter-spacing:2px;">[ ${title}_ANALYSIS ]</div>`;
            
            Object.entries(data.payload).forEach(([k, v]) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<span>${k.toUpperCase()}</span><span class="val" id="val-${title}-${k}">---</span>`;
                card.appendChild(row);
                decipherEffect(document.getElementById(`val-${title}-${k}`), String(v));
            });

            data.provenance.forEach(src => {
                const p = document.createElement('div');
                p.className = 'prov';
                p.innerText = `SOURCE: ${src.source} | HITS: ${src.hits} | CONFIDENCE: ${src.acc}`;
                card.appendChild(p);
            });

            document.getElementById('stream').prepend(card);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function decipherEffect(el, val) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
            let i = 0;
            const interval = setInterval(() => {
                el.innerText = val.split("").map((c, idx) => idx < i ? val[idx] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if(i >= val.length) clearInterval(interval);
                i += 1/3;
            }, 35);
        }

        // --- 🧊 THREE.JS CORE ---
        let coreSpeed = 0.005;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
