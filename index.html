<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON INTELLIGENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Share+Tech+Mono&display=swap');
        :root { --archon-cyan: #00ffcc; --archon-warn: #ffb700; --bg: #010305; --glass: rgba(2, 10, 15, 0.85); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; user-select: none; }
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 20px; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .archon-title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 5px; text-align: center; text-shadow: 0 0 15px var(--archon-cyan); margin-bottom: 15px; }
        .target-box { background: var(--glass); border-left: 4px solid var(--archon-cyan); padding: 18px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); position: relative; overflow: hidden; margin-bottom: 15px; }
        .scanning-laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--archon-warn); opacity: 0; }
        body.hacking .scanning-laser { opacity: 1; animation: scanSweep 2s linear infinite alternate; }
        .progress-bar { height: 4px; width: 0%; background: var(--archon-cyan); transition: 0.6s; box-shadow: 0 0 15px var(--archon-cyan); margin-bottom: 20px; }
        .btn { background: rgba(0,0,0,0.7); border: 1px solid var(--archon-cyan); color: var(--archon-cyan); padding: 16px; font-family: 'Orbitron', sans-serif; font-size: 13px; text-align: center; cursor: pointer; text-transform: uppercase; }
        .card { background: var(--glass); border-top: 2px solid var(--archon-cyan); padding: 15px; animation: cardIn 0.5s ease-out forwards; margin-bottom: 10px; }
        @keyframes cardIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .terminal { height: 120px; background: rgba(0,2,5,0.9); border: 1px solid #1a1a1a; padding: 10px; font-size: 11px; color: #0f0; overflow-y: auto; border-top: 2px solid #333; }
        @media (min-width: 768px) { .archon-title { font-size: 36px; } .target-box { padding: 25px; } .terminal { height: 180px; } }
        @keyframes scanSweep { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="boot-screen"><div style="font-family:'Orbitron'; font-size:24px; color:var(--archon-cyan); letter-spacing:10px;">ARCHON INTELLIGENCE</div></div>
    <div id="canvas-container"></div>
    <div class="ui-layer">
        <div class="archon-title">ARCHON INTELLIGENCE</div>
        <div class="target-box interactive"><div class="scanning-laser"></div><div><div style="font-size:10px; color:#555;">NODE_IDENTIFIER</div><div id="target-id" style="font-family:'Orbitron'; font-size:20px; color:var(--archon-cyan);">---</div></div><div id="sys-status" style="font-size:10px; border:1px solid var(--archon-cyan); padding:5px 10px;">STANDBY</div></div>
        <div class="progress-bar" id="prog-bar"></div>
        <div class="interactive" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;"><div class="btn" onclick="start()">Execute Omni-Chain</div><div class="btn" onclick="location.reload()" style="border-color:#444; color:#666;">Purge</div></div>
        <div class="stream interactive" id="stream"></div>
        <div class="terminal interactive" id="term"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; const p = new URLSearchParams(window.location.search); const target = p.get('target') || "DEMO";
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        setTimeout(() => { document.getElementById('boot-screen').style.opacity = '0'; setTimeout(() => document.getElementById('boot-screen').remove(), 800); }, 1200);
        function log(m, c="#0f0") { const e = document.createElement('div'); e.innerHTML = `<span style="color:${c}">[${new Date().toISOString().slice(11,19)}] ${m}</span>`; const t = document.getElementById('term'); t.appendChild(e); t.scrollTop = t.scrollHeight; }
        let busy = false; let steps = 7; let cur = 0;
        async function start() {
            if(busy) return; busy = true; document.body.classList.add('hacking');
            document.getElementById('sys-status').innerText = "EXTRACTING"; log(`ATTACK_START: ${target}`, "var(--archon-cyan)");
            execute(target, "initial");
        }
        async function execute(t, pr) {
            const chat = setInterval(() => log(`CALL_STACK::${pr.toUpperCase()} -> ADDR:0x${Math.floor(Math.random()*16777215).toString(16)}`, "#444"), 200);
            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${t}&protocol=${pr}&v=${Date.now()}`);
                clearInterval(chat); const data = await res.json(); render(pr.toUpperCase(), data);
                cur++; document.getElementById('prog-bar').style.width = `${(cur/steps)*100}%`;
                if(data.pivots && data.pivots.length > 0) setTimeout(() => execute(data.pivots[0].t, data.pivots[0].p), 1000);
                else { log("OMNI-CHAIN COMPLETE", "var(--archon-cyan)"); document.body.classList.remove('hacking'); busy = false; }
            } catch(e) { clearInterval(chat); log("LINK_FAILURE", "var(--archon-red)"); busy = false; }
        }
        function render(title, data) {
            const card = document.createElement('div'); card.className = 'card';
            let h = `<div style="font-size:10px; color:var(--archon-cyan); margin-bottom:10px;">// ${title}</div>`;
            if(data.analysis) Object.entries(data.analysis).forEach(([k, v]) => {
                const isAI = k.includes("Briefing");
                h += `<div style="margin-bottom:8px;"><div style="font-size:9px; color:#555;">${k}</div><div id="v-${title}-${k}" style="font-size:${isAI?'13px':'15px'}; color:${isAI?'#b829ff':'#fff'};">---</div></div>`;
            });
            card.innerHTML = h; document.getElementById('stream').prepend(card);
            Object.entries(data.analysis).forEach(([k, v]) => {
                const el = document.getElementById(`v-${title}-${k}`);
                if(k.includes("Briefing")) { el.textContent = ""; let j=0; const t=setInterval(()=>{el.textContent+=v[j++];if(j>=v.length)clearInterval(t)},20); }
                else el.textContent = v;
            });
        }
        const sc = new THREE.Scene(); const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ alpha:true, antialias:true }); rd.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(rd.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,1), new THREE.MeshBasicMaterial({color:0x00ffcc, wireframe:true, transparent:true, opacity:0.2}));
        sc.add(core); const pGeo = new THREE.BufferGeometry(); const pPos = new Float32Array(600*3);
        for(let i=0; i<1800; i++) pPos[i] = (Math.random()-0.5)*10; pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
        const pMat = new THREE.PointsMaterial({size:0.02, color:0x00ffcc, transparent:true, opacity:0.5});
        const pts = new THREE.Points(pGeo, pMat); sc.add(pts); cam.position.z = 5;
        function animate() {
            requestAnimationFrame(animate); const h = document.body.classList.contains('hacking');
            core.rotation.y += h ? 0.05 : 0.005; pts.rotation.y += h ? 0.02 : 0.001;
            core.scale.setScalar(h ? 1 + Math.sin(Date.now()*0.01)*0.1 : 1);
            pMat.color.setHex(h ? 0xffb700 : 0x00ffcc); rd.render(sc, cam);
        } animate();
    </script>
</body>
</html>
