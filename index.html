<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archon v8: Quantum Void</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ff41; --danger: #ff1111; --bg: #000; --dim: rgba(0, 255, 65, 0.15); }
        body, html { margin:0; padding:0; background:var(--bg); color:var(--neon); font-family:'Courier New', monospace; height:100%; overflow:hidden; }
        
        /* Matrix Rain Background */
        #matrix { position:fixed; top:0; left:0; z-index:-1; opacity:0.25; }
        
        .header { border-bottom:1px solid var(--neon); padding:15px; text-align:center; background:rgba(0,0,0,0.85); position: relative; z-index: 10; }
        .glitch { font-size:1.3rem; font-weight:bold; letter-spacing:4px; text-shadow:2px 0 red, -2px 0 blue; animation: glitch-anim 2s infinite; }
        @keyframes glitch-anim { 0% { opacity:1; transform: skew(0); } 50% { opacity:0.8; transform: skew(3deg); } 100% { opacity:1; transform: skew(0); } }

        #map { height:180px; border:1px solid #333; margin:10px; filter:invert(1) hue-rotate(180deg) brightness(0.65); border-radius:10px; box-shadow: 0 0 15px var(--dim); }
        .terminal { background:rgba(0,10,0,0.92); padding:12px; font-size:11px; height:110px; overflow-y:auto; border:1px solid #222; margin: 0 10px; border-radius: 5px; }
        
        .card { background:rgba(15,15,15,0.95); border:1px solid #333; padding:15px; border-left:4px solid var(--neon); margin:15px 10px; transform:translateX(-30px); opacity:0; transition:0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.active { transform:translateX(0); opacity:1; }
        
        .btn { border:1px solid var(--neon); padding:12px; text-align:center; margin:15px 10px; cursor:pointer; font-size:12px; font-weight: bold; transition: 0.3s; }
        .btn:active { background:var(--neon); color:#000; box-shadow: 0 0 20px var(--neon); }

        #auth-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .core { width:90px; height:90px; border:2px solid var(--neon); border-radius:50%; animation: pulse 1.5s infinite; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 15px var(--neon); }
        @keyframes pulse { 0% { box-shadow:0 0 5px var(--neon); transform: scale(1); } 50% { box-shadow:0 0 35px var(--neon); transform: scale(1.05); } 100% { box-shadow:0 0 5px var(--neon); transform: scale(1); } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="auth-overlay" onclick="startSystem()">
        <div class="glitch">ARCHON_V8</div>
        <div class="core">SYNC</div>
        <p style="margin-top:25px; font-size:10px; letter-spacing:4px; opacity: 0.7;">INITIALIZE QUANTUM UPLINK</p>
    </div>

    <div class="header">
        <div class="glitch">ARCHON_INTELLIGENCE</div>
        <div style="font-size:9px; opacity:0.6; margin-top:5px;">STATUS: SECURE | NODE: SUPREME</div>
    </div>

    <div id="map"></div>
    <div class="terminal" id="logs"></div>
    <div id="payload-container"></div>

    <script>
        // --- ANIMATION: MATRIX RAIN ---
        const c = document.getElementById('matrix'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const columns = Math.floor(c.width / 20);
        const drops = Array(columns).fill(0);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = '#0F0'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * 20, y);
                if(y > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i] += 20;
            });
        }
        setInterval(drawMatrix, 50);

        let tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target'), type = p.get('type'), uid = p.get('uid');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";

        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d) {
            const o = audio.createOscillator(); const g = audio.createGain();
            o.type = 'square'; o.frequency.value = f; o.connect(g); g.connect(audio.destination);
            g.gain.setValueAtTime(0.05, audio.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
            o.start(); o.stop(audio.currentTime + d);
        }

        function log(m) {
            const l = document.getElementById('logs');
            const d = document.createElement('div'); d.innerHTML = `> ${m}`;
            l.appendChild(d); l.scrollTop = l.scrollHeight;
            beep(900, 0.05);
        }

        async function startSystem() {
            if(audio.state === 'suspended') audio.resume();
            document.getElementById('auth-overlay').style.display = 'none';
            log("UPLINK ESTABLISHED.");
            log(`DECRYPTING PAYLOAD: ${target}`);
            
            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(target)}&type=${type}&uid=${uid}`);
                const data = await res.json();
                
                // Interactive Map Initialization
                let lat = data.geo?.lat || 20, lon = data.geo?.lon || 77;
                let map = L.map('map', {zoomControl: false, attributionControl: false}).setView([lat, lon], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.circle([lat, lon], {radius: 4000, color: '#00ff41', fillOpacity: 0.1}).addTo(map);

                log("PAYLOAD EXTRACTED. RENDERING DATA PANELS...");
                const out = document.getElementById('payload-container');

                // Panel 1: Registry Data (Now Auto-Fixed)
                let c1 = createCard("NETWORK_REGISTRY");
                c1.innerHTML += `TARGET: ${data.target}<br>`;
                c1.innerHTML += `REGION: ${data.registry?.loc || data.geo?.city || 'UNKNOWN'}<br>`;
                c1.innerHTML += `CARRIER: ${data.registry?.car || data.geo?.isp || 'PROTECTED'}`;
                out.appendChild(c1); setTimeout(() => c1.classList.add('active'), 200);

                // Panel 2: Breach Alerts
                if(data.leaks && data.leaks.result && data.leaks.result.length > 0) {
                    let c2 = createCard("BREACH_INTELLIGENCE", "var(--danger)");
                    data.leaks.result.slice(0, 5).forEach(l => c2.innerHTML += `<div style="font-size:10px; border-bottom:1px solid #222; padding:3px 0;">[!] ${l.line}</div>`);
                    out.appendChild(c2); setTimeout(() => c2.classList.add('active'), 500);
                    beep(200, 0.5);
                } else {
                    log("ZERO LEAKS DETECTED IN PUBLIC REPOSITORIES.");
                }

                // Panel 3: Global Search Override
                let c3 = createCard("WEB_SCRAPE_OVERRIDE");
                c3.innerHTML += `<div class="btn" onclick="window.open('https://www.google.com/search?q=%22${data.target}%22')">INITIATE DEEP SEARCH</div>`;
                out.appendChild(c3); setTimeout(() => c3.classList.add('active'), 800);

            } catch(e) { log("CRITICAL: UPLINK OFFLINE."); }
        }

        function createCard(t, c="var(--neon)") {
            const d = document.createElement('div'); d.className = 'card'; d.style.borderLeftColor = c;
            d.innerHTML = `<h5 style="margin:0 0 10px 0; color:${c}">[ ${t} ]</h5>`;
            return d;
        }
    </script>
</body>
</html>
