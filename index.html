<script>
    const tg = window.Telegram.WebApp; tg.expand();
    const p = new URLSearchParams(window.location.search);
    const target = p.get('target');
    const BACKEND = "https://archon-intelligence-backend.onrender.com";
    document.getElementById('target-id').innerText = target || "IDLE";

    function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.2; window.speechSynthesis.speak(u); }

    async function initializeRip() {
        document.getElementById('status-bar').innerText = "UPLINK_STATUS: FORCING_EXTRACTION...";
        document.getElementById('status-bar').style.color = "#ffaa00";
        tg.HapticFeedback.impactOccurred('heavy');
        
        let proto = target.includes('@') ? "email" : (target.match(/\d+\./) ? "ip" : "username");
        executeRecursiveRip(target, proto);
    }

    async function executeRecursiveRip(node, proto) {
        document.body.classList.add('ripping'); coreSpeed = 0.2; 
        speak(`Ripping ${proto} node.`);

        try {
            const res = await fetch(`${BACKEND}/api/scan?target=${node}&protocol=${proto}`);
            if(!res.ok) throw new Error(`HTTP ERROR: ${res.status}`);

            const data = await res.json();
            
            document.getElementById('status-bar').innerText = "UPLINK_STATUS: DATA_SECURED";
            document.getElementById('status-bar').style.color = "#00ffcc";
            renderCard(proto.toUpperCase(), data);

            if(data.pivots && data.pivots.length > 0) {
                data.pivots.forEach(piv => {
                    setTimeout(() => executeRecursiveRip(piv.t, piv.p), 4000);
                });
            } else {
                setTimeout(() => { document.body.classList.remove('ripping'); coreSpeed = 0.005; }, 2000);
            }
        } catch (e) { 
            document.body.classList.remove('ripping'); 
            document.getElementById('status-bar').innerText = "UPLINK_STATUS: BLOCKED_BY_TELEGRAM";
            document.getElementById('status-bar').style.color = "#ff3333";
            // THIS WILL SHOW YOU EXACTLY WHY IT FAILED
            alert("TELEGRAM SYSTEM BLOCK: " + e.message);
        }
    }

    function renderCard(title, data) {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<div style="color:var(--neon); font-size:9px; margin-bottom:12px; letter-spacing:2px;">[ ${title}_ANALYSIS ]</div>`;
        
        Object.entries(data.analysis).forEach(([k, v]) => {
            const row = document.createElement('div'); row.className = 'row';
            row.innerHTML = `<span>${k.toUpperCase()}</span><span class="val" id="rip-${title}-${k}">---</span>`;
            card.appendChild(row);
            decipher(document.getElementById(`rip-${title}-${k}`), String(v));
        });
        document.getElementById('stream').prepend(card);
        tg.HapticFeedback.impactOccurred('heavy');
    }

    function decipher(el, val) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*"; let i = 0;
        const interval = setInterval(() => {
            el.innerText = val.split("").map((c, idx) => idx < i ? val[idx] : chars[Math.floor(Math.random()*chars.length)]).join("");
            if(i >= val.length) clearInterval(interval); i += 1/3;
        }, 30);
    }

    let coreSpeed = 0.005;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas').appendChild(renderer.domElement);
    const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
    scene.add(core); camera.position.z = 5;
    function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
    animate();
</script>
